<!DOCTYPE html>

<head>

    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5.2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6.18.2"></script>
    
    <style>
        table {
            border-spacing: 15px;

</head>
<body>
    
        <div id="params_yaml" style="text-align: center; padding: 10x">

<thead>

</thead>
<tbody>
<tr><td style="text-align: right;">            64</td></tr>
</tbody>
</table>
            </div>

<thead>
<tr><th style="text-align: right;">  train_loss</th><th style="text-align: right;">  epoch</th><th style="text-align: right;">  step</th></tr>
</thead>
<tbody>
<tr><td style="text-align: right;">   0.0166061</td><td style="text-align: right;">      4</td><td style="text-align: right;">   499</td></tr>
</tbody>
</table>
            </div>
        </div>

    <div id = "static_epoch">
        <script type = "text/javascript">
            var spec = {
    "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
    "data": {
        "values": [
    {
        "epoch": "0",
        "rev": "workspace",

    },
    {

        "step": "299"

        "step": "399"

    {

        "step": "449"

    {
        "epoch": "4",
        "rev": "workspace",
        "step": "499"
    }
]
    },
    "title": "",
    "width": 300,
    "height": 300,
    "layer": [
        {
            "encoding": {
                "x": {
                    "field": "step",
                    "type": "quantitative",
                    "title": "step"
                },
                "y": {
                    "field": "epoch",
                    "type": "quantitative",
                    "title": "epoch",
                    "scale": {
                        "zero": false
                    }
                },
                "color": {
                    "field": "rev",
                    "type": "nominal"
                },
                "tooltip": [
                    {
                        "field": "step",
                        "type": "quantitative"
                    },
                    {
                        "field": "epoch",
                        "type": "quantitative"
                    },
                    {
                        "field": "rev",
                        "type": "nominal"
                    }
                ]
            },
            "layer": [
                {
                    "mark": "line"
                },
                {
                    "transform": [
                        {
                            "filter": {
                                "param": "hover",
                                "empty": false
                            }
                        }
                    ],
                    "mark": "circle"
                },
                {
                    "mark": "rule",
                    "params": [
                        {
                            "name": "hover",
                            "select": {
                                "type": "point",
                                "on": "mouseover",
                                "nearest": true
                            }
                        }
                    ],
                    "encoding": {
                        "color": {
                            "condition": {
                                "param": "hover",
                                "empty": false,
                                "value": "1"
                            },
                            "value": "transparent"
                        }
                    }
                }
            ]
        }
    ]
}
;
            vegaEmbed('#static_epoch', spec);
        </script>
    </div>
